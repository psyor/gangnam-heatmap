const CACHE_KEY = 'geo_0721_v1';
const SLOT_COLORS = ['#F59E0B','#10B981','#FF6B35','#7F77DD'];
const ZONE_COLORS = {
  '역삼동':'#FF6B35','논현동':'#F59E0B','대치동':'#10B981',
  '신사동':'#7F77DD','삼성동':'#EC4899','청담동':'#06B6D4',
  '서초동':'#84CC16','도곡동':'#F97316','잠원동':'#A855F7','반포동':'#14B8A6',
};
function zc(z){ return ZONE_COLORS[z]||'#888'; }
function ll(a,b){ return new naver.maps.LatLng(a,b); }

let map, AM=[], AL=[], IW=[];
let currentSlot=0, selectedIdx=-1;
let cache={};
try{ cache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}'); }catch(e){}
function saveCache(){ try{localStorage.setItem(CACHE_KEY,JSON.stringify(cache));}catch(e){} }

map = new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.505,127.025), zoom:13, scaleControl:false,
});

function gcOne(addr){
  return new Promise((res,rej)=>{
    if(cache[addr]){ res(cache[addr]); return; }
    naver.maps.Service.geocode({query:addr},(st,resp)=>{
      if(st!==naver.maps.Service.Status.OK){ rej(); return; }
      const it=resp.v2.addresses;
      if(!it||!it.length){ rej(); return; }
      const r={lat:parseFloat(it[0].y),lng:parseFloat(it[0].x)};
      cache[addr]=r; res(r);
    });
  });
}

async function gcBatch(addrs){
  const q=addrs.filter(a=>a&&!cache[a]);
  if(!q.length) return;
  const workers=Array(Math.min(5,q.length)).fill(null).map(async()=>{
    while(q.length>0){ const a=q.shift(); try{await gcOne(a);}catch(e){} }
  });
  await Promise.all(workers);
  saveCache();
}

function clr(){ AM.forEach(m=>m.setMap(null)); AL.forEach(l=>l.setMap(null)); IW.forEach(w=>w.close()); AM=[];AL=[];IW=[]; }

function setOverlay(msg,color){
  const el=document.getElementById('status-overlay');
  if(!msg){ el.style.display='none'; return; }
  el.textContent=msg; el.style.color=color||'#aaa'; el.style.borderColor=color||'#444'; el.style.display='block';
}

function getShops(){ return DATA.slots[currentSlot]||[]; }

function renderShopList(){
  const color=SLOT_COLORS[currentSlot];
  document.getElementById('shop-list').innerHTML=getShops().map((s,i)=>`
    <div class="shop-item ${selectedIdx===i?'active':''}"
         onclick="selectByIdx(${i})"
         style="${selectedIdx===i?'border-left-color:'+color+';':''}">
      <div class="shop-name">${s.shop}</div>
      <div class="shop-sub">
        <span class="shop-cnt" style="color:${color}">${s.total}건</span>
        <span class="shop-zone" style="color:${zc(s.zone)}">${s.zone}</span>
      </div>
    </div>`).join('');
}

function renderDestList(shop){
  if(!shop){
    document.getElementById('dest-list').innerHTML='<div style="padding:12px;font-size:11px;color:#444">← 상점 클릭</div>';
    document.getElementById('dest-panel-title').textContent='배달지 전체';
    return;
  }
  const maxCnt=Math.max(...shop.dests.map(d=>d[1]));
  document.getElementById('dest-panel-title').textContent=`배달지 ${shop.dests.length}곳`;
  document.getElementById('dest-list').innerHTML=shop.dests.map(([addr,cnt],i)=>`
    <div class="dest-item" onclick="focusDest(${currentSlot},${selectedIdx},${i})">
      <div class="dest-addr" title="${addr}">${addr.replace(/서울특별시 |서울 /g,'')}</div>
      <div class="dest-cnt">${cnt}건</div>
      <div class="dest-bar"><div class="dest-bar-fill" style="width:${Math.round(cnt/maxCnt*100)}%"></div></div>
    </div>`).join('');
}

async function selectByIdx(idx){
  selectedIdx=idx;
  renderShopList();
  const shop=getShops()[idx];
  renderDestList(shop);
  clr();

  const allAddrs=[shop.pickup_addr,...shop.dests.map(d=>d[0])].filter(Boolean);
  const needGeo=allAddrs.filter(a=>!cache[a]);

  if(needGeo.length>0){
    setOverlay(`⏳ 변환 중 (${needGeo.length}개)...`,'#F59E0B');
    await gcBatch(needGeo);
    setOverlay(null);
  } else {
    setOverlay('⚡ 즉시 로딩','#10B981');
    setTimeout(()=>setOverlay(null),1000);
  }

  draw(shop);

  document.getElementById('statusbar').innerHTML=
    `<b style="color:${SLOT_COLORS[currentSlot]}">${DATA.slot_names[currentSlot]}</b>
     &nbsp;|&nbsp; <b>${shop.shop}</b>
     &nbsp; 총 ${shop.total}건 &nbsp; 배달지 ${shop.dests.length}곳
     &nbsp; 평균 ${shop.avg_fee.toLocaleString()}원
     &nbsp; <span style="color:${zc(shop.zone)}">${shop.zone}</span>`;
}

function draw(shop){
  const color=zc(shop.zone);
  const sp=cache[shop.pickup_addr]; if(!sp) return;
  const sll=ll(sp.lat,sp.lng);
  const maxCnt=Math.max(...shop.dests.map(d=>d[1]));
  const valid=[];

  AM.push(new naver.maps.Marker({map,position:sll,zIndex:100,icon:{
    content:`<div style="background:${color};border:3px solid #fff;border-radius:10px;padding:5px 10px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.5)">${shop.shop.substring(0,14)}</div>`,
    anchor:new naver.maps.Point(0,24),
  }}));

  shop.dests.forEach(([addr,cnt])=>{
    const dp=cache[addr]; if(!dp) return;
    const ratio=cnt/maxCnt;
    const dll=ll(dp.lat,dp.lng);
    valid.push(dp);

    AL.push(new naver.maps.Polyline({map,path:[sll,dll],
      strokeColor:color, strokeWeight:Math.max(1,ratio*5),
      strokeOpacity:0.1+ratio*0.75,
    }));

    const ang=Math.atan2(dp.lng-sp.lng,dp.lat-sp.lat)*180/Math.PI;
    AM.push(new naver.maps.Marker({map,
      position:ll(sp.lat+(dp.lat-sp.lat)*0.65,sp.lng+(dp.lng-sp.lng)*0.65),
      icon:{
        content:`<div style="width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:8px solid ${color};transform:rotate(${ang}deg);opacity:${0.3+ratio*0.6};pointer-events:none;"></div>`,
        anchor:new naver.maps.Point(4,4),
      }
    }));

    const sz=Math.max(14,Math.round(12+ratio*16));
    const dm=new naver.maps.Marker({map,position:dll,icon:{
      content:`<div style="width:${sz}px;height:${sz}px;border-radius:4px;background:rgba(127,119,221,${0.15+ratio*0.75});border:1.5px solid #7F77DD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">${cnt}</div>`,
      anchor:new naver.maps.Point(sz/2,sz/2),
    }});

    const iw=new naver.maps.InfoWindow({
      content:`<div style="background:#1a1a1a;border:1px solid ${color};border-radius:8px;padding:8px 12px;">
        <div style="color:${color};font-weight:700;margin-bottom:3px">${cnt}건 (${Math.round(ratio*100)}%)</div>
        <div style="color:#ccc;font-size:11px">${addr.replace(/서울특별시 |서울 /g,'')}</div>
        <div style="color:#888;font-size:10px;margin-top:3px">← ${shop.shop.substring(0,15)}</div>
      </div>`,
      borderColor:'transparent',backgroundColor:'transparent',borderWidth:0,disableAnchor:true,
    });
    naver.maps.Event.addListener(dm,'click',()=>{ IW.forEach(w=>w.close()); iw.open(map,dm); });
    AM.push(dm); IW.push(iw);
  });

  if(valid.length>0){
    const lats=[sp.lat,...valid.map(d=>d.lat)];
    const lngs=[sp.lng,...valid.map(d=>d.lng)];
    map.fitBounds(new naver.maps.LatLngBounds(
      ll(Math.min(...lats)-0.004,Math.min(...lngs)-0.004),
      ll(Math.max(...lats)+0.004,Math.max(...lngs)+0.004)
    ));
  }
}

function focusDest(slot,shopIdx,destIdx){
  const addr=DATA.slots[slot][shopIdx].dests[destIdx][0];
  const p=cache[addr]; if(p) map.panTo(ll(p.lat,p.lng));
}

function setSlot(slot){
  currentSlot=slot; selectedIdx=-1; clr();
  document.querySelectorAll('.slot-tab').forEach((t,i)=>
    t.className='slot-tab s'+i+(i===slot?' active':''));
  renderShopList();
  renderDestList(null);
  document.getElementById('statusbar').textContent='상점을 선택하면 전체 배달지 동선이 표시됩니다';
}

naver.maps.Event.addListener(map,'init',()=>renderShopList());
setTimeout(()=>renderShopList(),500);
</script>
</body>
</html>
