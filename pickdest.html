const CACHE_KEY = 'gangnam_geo_cache_v1';
let map, markers=[], lines=[], iwins=[];
let currentSlot='all', currentShop=null;

// ── localStorage 캐시 ──────────────────────────
let geoCache = {};
try {
  const saved = localStorage.getItem(CACHE_KEY);
  if(saved) {
    geoCache = JSON.parse(saved);
    console.log(`캐시 로딩: ${Object.keys(geoCache).length}개 주소`);
  }
} catch(e) {}

function saveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(geoCache)); } catch(e) {}
}

// ── 색상 ──────────────────────────────────────
const ZONE_COLORS = {
  '역삼동':'#FF6B35','논현동':'#F59E0B','대치동':'#10B981',
  '신사동':'#7F77DD','삼성동':'#EC4899','청담동':'#06B6D4',
  '서초동':'#84CC16','도곡동':'#F97316','잠원동':'#A855F7',
  '반포동':'#14B8A6','기타':'#888',
};
function zc(z){ return ZONE_COLORS[z]||'#888'; }
function ll(lat,lng){ return new naver.maps.LatLng(lat,lng); }

// ── 지도 초기화 ────────────────────────────────
map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.502,127.028),
  zoom:13, scaleControl:false,
});

// ── Geocoding (캐시 우선) ──────────────────────
function gc(addr) {
  return new Promise((res,rej) => {
    // 캐시 히트
    if(geoCache[addr]) { res(geoCache[addr]); return; }
    // API 호출
    naver.maps.Service.geocode({query:addr}, (st,resp) => {
      if(st !== naver.maps.Service.Status.OK) { rej(); return; }
      const it = resp.v2.addresses;
      if(!it||!it.length) { rej(); return; }
      const r = {lat:parseFloat(it[0].y), lng:parseFloat(it[0].x)};
      geoCache[addr] = r;  // 캐시 저장
      res(r);
    });
  });
}

// ── 지도 클리어 ────────────────────────────────
function clr() {
  markers.forEach(m=>m.setMap(null));
  lines.forEach(l=>l.setMap(null));
  iwins.forEach(w=>w.close());
  markers=[]; lines=[]; iwins=[];
}

// ── 현재 슬롯 데이터 ───────────────────────────
function getShops() {
  return currentSlot==='all' ? DATA.all_shops : (DATA.slot_shops[currentSlot]||[]);
}

// ── 상점 리스트 렌더 ───────────────────────────
function renderShopList() {
  const shops = getShops();
  document.getElementById('shop-list').innerHTML = shops.map(s => `
    <div class="shop-item ${currentShop===s.shop?'active':''}"
         onclick="selectShop('${s.shop.replace(/\/g,'\\').replace(/'/g,"\'")}')">
      <div class="shop-name" title="${s.shop}">${s.shop}</div>
      <div class="shop-meta">
        <span class="shop-cnt">${s.total}건</span>
        <span class="shop-fee">${s.avg_fee.toLocaleString()}원</span>
      </div>
      <div class="shop-zone" style="color:${zc(s.zone)}">${s.zone}</div>
    </div>`).join('');
}

// ── 배달지 리스트 렌더 ─────────────────────────
function renderDestList(shop) {
  if(!shop) {
    document.getElementById('dest-list').innerHTML =
      '<div style="padding:12px;font-size:11px;color:#555">상점을 선택하세요</div>';
    return;
  }
  document.getElementById('dest-list').innerHTML = shop.dests.map(([addr,cnt]) => `
    <div class="dest-item" onclick="focusDest('${addr.replace(/\/g,'\\').replace(/'/g,"\'")}')">
      <div class="dest-addr" title="${addr}">
        ${addr.replace('서울특별시 ','').replace('서울 ','')}
      </div>
      <div class="dest-cnt">${cnt}건</div>
    </div>`).join('');
}

// ── 상점 선택 ──────────────────────────────────
async function selectShop(shopName) {
  currentShop = shopName;
  renderShopList();

  const shop = getShops().find(s=>s.shop===shopName);
  if(!shop) return;

  renderDestList(shop);

  // 상태바
  document.getElementById('stat-shop').innerHTML = `상점 <span>${shopName.substring(0,12)}</span>`;
  document.getElementById('stat-cnt').innerHTML  = `건수 <span>${shop.total}건</span>`;
  document.getElementById('stat-fee').innerHTML  = `단가 <span>${shop.avg_fee.toLocaleString()}원</span>`;
  document.getElementById('stat-dest').innerHTML = `배달지 <span>${shop.dests.length}곳</span>`;

  clr();

  // 캐시 여부 확인
  const allAddrs = [shop.pickup_addr, ...shop.dests.map(d=>d[0])];
  const cachedCount = allAddrs.filter(a=>geoCache[a]).length;
  const isCached = cachedCount === allAddrs.length;

  if(isCached) {
    // 캐시 히트 → 즉시 렌더
    document.getElementById('cache-badge').style.display='block';
    setTimeout(()=>document.getElementById('cache-badge').style.display='none', 2000);
    await drawShopDest(shop);
  } else {
    // 캐시 미스 → 로딩 표시
    const needCount = allAddrs.filter(a=>!geoCache[a]).length;
    document.getElementById('loading').style.display='flex';
    document.getElementById('loading-text').textContent=`주소 변환 중... (0/${needCount})`;
    document.getElementById('loading-bar').style.width='0%';

    let done=0;
    for(const addr of allAddrs) {
      if(!geoCache[addr]) {
        try { await gc(addr); } catch(e) {}
        done++;
        document.getElementById('loading-text').textContent=`주소 변환 중... (${done}/${needCount})`;
        document.getElementById('loading-bar').style.width=(done/needCount*100)+'%';
        await new Promise(r=>setTimeout(r,60));
      }
    }
    saveCache();  // 캐시 저장
    document.getElementById('loading').style.display='none';
    await drawShopDest(shop);
  }
}

// ── 상점→배달지 지도 그리기 ────────────────────
async function drawShopDest(shop) {
  const color = zc(shop.zone);
  const shopPos = geoCache[shop.pickup_addr];
  if(!shopPos) return;
  const shopLl = ll(shopPos.lat, shopPos.lng);
  const maxCnt = Math.max(...shop.dests.map(d=>d[1]));

  // 상점 마커
  const shopM = new naver.maps.Marker({
    map, position:shopLl, zIndex:100,
    icon:{
      content:`<div style="background:${color};border:3px solid #fff;border-radius:10px;padding:5px 10px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.5)">${shop.shop.substring(0,14)}</div>`,
      anchor: new naver.maps.Point(0,22),
    }
  });
  markers.push(shopM);

  // 배달지 마커 + 연결선
  const validDests = [];
  shop.dests.forEach(([addr,cnt]) => {
    const pos = geoCache[addr];
    if(!pos) return;
    const ratio = cnt/maxCnt;
    const destLl = ll(pos.lat,pos.lng);
    validDests.push({addr,cnt,pos,ratio,destLl});

    // 연결선
    lines.push(new naver.maps.Polyline({
      map, path:[shopLl,destLl],
      strokeColor:color,
      strokeWeight:Math.max(1.5,Math.round(ratio*5)),
      strokeOpacity:0.25+ratio*0.6,
      strokeStyle:'solid',
    }));

    // 화살표 (선 70% 지점)
    const aLat = shopPos.lat+(pos.lat-shopPos.lat)*0.65;
    const aLng = shopPos.lng+(pos.lng-shopPos.lng)*0.65;
    const angle = Math.atan2(pos.lng-shopPos.lng, pos.lat-shopPos.lat)*180/Math.PI;
    markers.push(new naver.maps.Marker({
      map, position:ll(aLat,aLng),
      icon:{
        content:`<div style="width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:8px solid ${color};transform:rotate(${angle}deg);opacity:${0.4+ratio*0.5};pointer-events:none;"></div>`,
        anchor:new naver.maps.Point(4,4),
      }
    }));

    // 배달지 마커
    const sz = Math.max(16,Math.round(14+ratio*14));
    const destM = new naver.maps.Marker({
      map, position:destLl,
      icon:{
        content:`<div style="width:${sz}px;height:${sz}px;border-radius:3px;background:rgba(127,119,221,${0.25+ratio*0.65});border:2px solid #7F77DD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">${cnt}</div>`,
        anchor:new naver.maps.Point(sz/2,sz/2),
      }
    });

    // 클릭 정보창
    const iw = new naver.maps.InfoWindow({
      content:`<div style="background:#1a1a1a;border:1px solid ${color};border-radius:8px;padding:8px 12px;min-width:180px;">
        <div style="color:${color};font-weight:700;margin-bottom:4px">📦 배달지</div>
        <div style="color:#ccc;font-size:11px;margin-bottom:4px;word-break:break-all">${addr.replace('서울특별시 ','')}</div>
        <div style="color:#FF6B35;font-weight:700;font-size:13px">${cnt}건</div>
        <div style="color:#888;font-size:10px;margin-top:2px">← ${shop.shop}</div>
      </div>`,
      borderColor:'transparent',backgroundColor:'transparent',borderWidth:0,disableAnchor:true,
    });
    naver.maps.Event.addListener(destM,'click',()=>{
      iwins.forEach(w=>w.close()); iw.open(map,destM);
    });
    markers.push(destM); iwins.push(iw);
  });

  // 지도 범위 맞추기
  if(validDests.length > 0) {
    const lats = [shopPos.lat,...validDests.map(d=>d.pos.lat)];
    const lngs = [shopPos.lng,...validDests.map(d=>d.pos.lng)];
    map.fitBounds(new naver.maps.LatLngBounds(
      ll(Math.min(...lats)-0.004, Math.min(...lngs)-0.004),
      ll(Math.max(...lats)+0.004, Math.max(...lngs)+0.004)
    ));
  }
}

function focusDest(addr) {
  const pos = geoCache[addr];
  if(pos) map.panTo(ll(pos.lat,pos.lng));
}

function setSlot(slot) {
  currentSlot = slot;
  currentShop = null;
  clr();
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['all','0','1','2','3'][i]===slot);
  });
  renderShopList();
  renderDestList(null);
  ['stat-shop','stat-cnt','stat-fee','stat-dest'].forEach(id=>{
    document.getElementById(id).innerHTML = document.getElementById(id).className;
  });
}

naver.maps.Event.addListener(map,'init',()=>renderShopList());
setTimeout(()=>renderShopList(),500);
</script>
</body>
</html>
