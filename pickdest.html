const CACHE_KEY = 'geo_v2';
const ZONE_COLORS = {
  '역삼동':'#FF6B35','논현동':'#F59E0B','대치동':'#10B981',
  '신사동':'#7F77DD','삼성동':'#EC4899','청담동':'#06B6D4',
  '서초동':'#84CC16','도곡동':'#F97316','잠원동':'#A855F7','반포동':'#14B8A6',
};
function zc(z){return ZONE_COLORS[z]||'#888';}
function ll(a,b){return new naver.maps.LatLng(a,b);}

let map, AM=[], AL=[], IW=[];
let currentSlot='all', currentShop=null;
let cache={};

// 캐시 로드
try{ cache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}'); }catch(e){}
function saveCache(){ try{localStorage.setItem(CACHE_KEY,JSON.stringify(cache));}catch(e){} }

map = new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.502,127.028), zoom:13, scaleControl:false,
});

// ── Geocoding 단건 ─────────────────────────────
function gcOne(addr){
  return new Promise((res,rej)=>{
    if(cache[addr]){res(cache[addr]);return;}
    naver.maps.Service.geocode({query:addr},(st,resp)=>{
      if(st!==naver.maps.Service.Status.OK){rej();return;}
      const it=resp.v2.addresses;
      if(!it||!it.length){rej();return;}
      const r={lat:parseFloat(it[0].y),lng:parseFloat(it[0].x)};
      cache[addr]=r; res(r);
    });
  });
}

// ── 병렬 Geocoding ─────────────────────────────
// 한 번에 N개씩 동시 실행 (API 부하 방지)
async function gcBatch(addrs, concurrency=4){
  const results={};
  const queue=[...addrs];
  const workers = Array(Math.min(concurrency,queue.length)).fill(null).map(async()=>{
    while(queue.length>0){
      const addr=queue.shift();
      try{ results[addr]=await gcOne(addr); }catch(e){ results[addr]=null; }
    }
  });
  await Promise.all(workers);
  return results;
}

function clr(){AM.forEach(m=>m.setMap(null));AL.forEach(l=>l.setMap(null));IW.forEach(w=>w.close());AM=[];AL=[];IW=[];}
function getShops(){return currentSlot==='all'?DATA.all_shops:(DATA.slot_shops[currentSlot]||[]);}

function renderShopList(){
  document.getElementById('shop-list').innerHTML=getShops().map(s=>`
    <div class="shop-item ${currentShop===s.shop?'active':''}"
         onclick="sel('${s.shop.replace(/\/g,'\\').replace(/'/g,"\'")}')">
      <div class="shop-name" title="${s.shop}">${s.shop}</div>
      <div class="shop-meta">
        <span class="shop-cnt">${s.total}건</span>
        <span class="shop-fee">${s.avg_fee.toLocaleString()}원</span>
      </div>
      <div class="shop-zone" style="color:${zc(s.zone)}">${s.zone}</div>
    </div>`).join('');
}

function renderDestList(shop){
  if(!shop){document.getElementById('dest-list').innerHTML='<div style="padding:12px;font-size:11px;color:#555">상점 선택</div>';return;}
  document.getElementById('dest-list').innerHTML=shop.dests.map(([addr,cnt])=>`
    <div class="dest-item" onclick="focusDest('${addr.replace(/\/g,'\\').replace(/'/g,"\'")}')">
      <div class="dest-addr" title="${addr}">${addr.replace(/서울특별시 |서울 /g,'')}</div>
      <div class="dest-cnt">${cnt}건</div>
    </div>`).join('');
}

async function sel(shopName){
  currentShop=shopName;
  renderShopList();
  const shop=getShops().find(s=>s.shop===shopName);
  if(!shop) return;
  renderDestList(shop);
  document.getElementById('s1').innerHTML=`상점 <span>${shopName.substring(0,12)}</span>`;
  document.getElementById('s2').innerHTML=`<span>${shop.total}건</span>`;
  document.getElementById('s3').innerHTML=`평균 <span>${shop.avg_fee.toLocaleString()}원</span>`;
  clr();

  // 변환 필요한 주소 수집
  const allAddrs=[shop.pickup_addr,...shop.dests.map(d=>d[0])].filter(Boolean);
  const needGeo=allAddrs.filter(a=>!cache[a]);
  const isCached=needGeo.length===0;

  if(isCached){
    const badge=document.getElementById('cache-badge');
    badge.style.display='block';
    setTimeout(()=>badge.style.display='none',1500);
  } else {
    // 병렬 변환 (4개 동시)
    const mini=document.getElementById('mini-loading');
    mini.style.display='block';
    mini.textContent=`⏳ 변환 중 (${needGeo.length}개)`;
    await gcBatch(needGeo, 4);
    saveCache();
    mini.style.display='none';
  }

  // 지도 그리기
  drawShopDest(shop);
}

function drawShopDest(shop){
  const color=zc(shop.zone);
  const sp=cache[shop.pickup_addr];
  if(!sp) return;
  const sll=ll(sp.lat,sp.lng);
  const maxCnt=Math.max(...shop.dests.map(d=>d[1]));

  // 상점 마커
  AM.push(new naver.maps.Marker({map,position:sll,zIndex:100,icon:{
    content:`<div style="background:${color};border:3px solid #fff;border-radius:10px;padding:5px 10px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.5)">${shop.shop.substring(0,14)}</div>`,
    anchor:new naver.maps.Point(0,22),
  }}));

  const validDests=[];
  shop.dests.forEach(([addr,cnt])=>{
    const dp=cache[addr]; if(!dp) return;
    const ratio=cnt/maxCnt;
    const dll=ll(dp.lat,dp.lng);
    validDests.push({addr,cnt,dp,ratio,dll});

    // 연결선
    AL.push(new naver.maps.Polyline({map,path:[sll,dll],
      strokeColor:color,strokeWeight:Math.max(1.5,ratio*5),
      strokeOpacity:0.2+ratio*0.65,strokeStyle:'solid',
    }));

    // 화살표
    const aLat=sp.lat+(dp.lat-sp.lat)*0.65;
    const aLng=sp.lng+(dp.lng-sp.lng)*0.65;
    const ang=Math.atan2(dp.lng-sp.lng,dp.lat-sp.lat)*180/Math.PI;
    AM.push(new naver.maps.Marker({map,position:ll(aLat,aLng),icon:{
      content:`<div style="width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:8px solid ${color};transform:rotate(${ang}deg);opacity:${0.4+ratio*0.5};pointer-events:none;"></div>`,
      anchor:new naver.maps.Point(4,4),
    }}));

    // 배달지 마커
    const sz=Math.max(15,Math.round(13+ratio*13));
    const dm=new naver.maps.Marker({map,position:dll,icon:{
      content:`<div style="width:${sz}px;height:${sz}px;border-radius:3px;background:rgba(127,119,221,${0.2+ratio*0.7});border:2px solid #7F77DD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">${cnt}</div>`,
      anchor:new naver.maps.Point(sz/2,sz/2),
    }});
    const iw=new naver.maps.InfoWindow({
      content:`<div style="background:#1a1a1a;border:1px solid ${color};border-radius:8px;padding:8px 12px;min-width:160px;font-size:11px;">
        <div style="color:${color};font-weight:700;margin-bottom:3px">📦 배달지</div>
        <div style="color:#ccc;margin-bottom:4px;word-break:break-all">${addr.replace(/서울특별시 |서울 /g,'')}</div>
        <div style="color:#FF6B35;font-weight:700">${cnt}건</div>
      </div>`,
      borderColor:'transparent',backgroundColor:'transparent',borderWidth:0,disableAnchor:true,
    });
    naver.maps.Event.addListener(dm,'click',()=>{IW.forEach(w=>w.close());iw.open(map,dm);});
    AM.push(dm); IW.push(iw);
  });

  // 지도 범위
  if(validDests.length>0){
    const lats=[sp.lat,...validDests.map(d=>d.dp.lat)];
    const lngs=[sp.lng,...validDests.map(d=>d.dp.lng)];
    map.fitBounds(new naver.maps.LatLngBounds(
      ll(Math.min(...lats)-0.004,Math.min(...lngs)-0.004),
      ll(Math.max(...lats)+0.004,Math.max(...lngs)+0.004)
    ));
  }
}

function focusDest(addr){const p=cache[addr];if(p)map.panTo(ll(p.lat,p.lng));}

function setSlot(slot){
  currentSlot=slot; currentShop=null; clr();
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['all','0','1','2','3'][i]===slot));
  renderShopList(); renderDestList(null);
}

naver.maps.Event.addListener(map,'init',()=>renderShopList());
setTimeout(()=>renderShopList(),500);
</script>
</body>
</html>
