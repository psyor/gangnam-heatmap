ver": "00:39", "group_id": 91, "group_size": 2, "is_multi": true, "color": "#14B8A6", "slot": 3, "pickup_order": [93, 92], "deliver_order": [93, 92]}];


let map, currentSlot=0, cache={}, AM=[], AL=[];

map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.502, 127.025),
  zoom:14, scaleControl:false,
});

function gc(addr) {
  return new Promise((res,rej) => {
    naver.maps.Service.geocode({query:addr}, (st,resp) => {
      if(st!==naver.maps.Service.Status.OK){rej();return;}
      const it=resp.v2.addresses;
      if(!it||!it.length){rej();return;}
      res({lat:parseFloat(it[0].y),lng:parseFloat(it[0].x)});
    });
  });
}

async function loadSlot(si) {
  if(cache[si]) return;
  const items = ALL.filter(d=>d.slot===si);
  const res = [];
  let done=0, total=items.length*2;
  document.getElementById('loading').style.display='flex';
  for(const d of items){
    let p=null,de=null;
    try{p=await gc(d.pickup_addr);}catch(e){}
    done++;
    try{de=await gc(d.dest_addr);}catch(e){}
    done++;
    res.push({...d,p,de});
    document.getElementById('loading-text').textContent=`주소 변환 중... (${done}/${total})`;
    document.getElementById('loading-bar').style.width=(done/total*100)+'%';
    await new Promise(r=>setTimeout(r,60));
  }
  document.getElementById('loading').style.display='none';
  cache[si]=res;
}

function clr(){AM.forEach(m=>m.setMap(null));AL.forEach(l=>l.setMap(null));AM=[];AL=[];}

function mkM(pos,label,color,isActive,isCompleted,isPickup){
  const sz=isActive?26:20;
  const bg=isCompleted?'#1e1e1e':color;
  const bc=isCompleted?'#333':(isActive?'#fff':color+'cc');
  const tc=isCompleted?'#444':'#fff';
  const glow=isActive?`box-shadow:0 0 0 4px ${color}44;`:'';
  const sh=isPickup?'border-radius:50%;':'border-radius:4px;';
  const op=isCompleted?'opacity:0.3;':'';
  return new naver.maps.Marker({map,position:pos,icon:{
    content:`<div style="width:${sz}px;height:${sz}px;${sh}background:${bg};border:2px solid ${bc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${tc};${glow}${op}">${label}</div>`,
    anchor:new naver.maps.Point(sz/2,sz/2),
  }});
}

function mkLine(path,color,weight,opacity,style){
  return new naver.maps.Polyline({map,path,
    strokeColor:color,strokeWeight:weight,strokeOpacity:opacity,strokeStyle:style});
}

function arrow(from,to,color,opacity){
  // 화살표: 짧은 선 + 끝에 작은 삼각형 마커
  const line = mkLine([from,to],color,2,opacity,'solid');
  return line;
}

function renderAt(stepIdx){
  const data=cache[currentSlot];
  if(!data) return;
  clr();

  // stepIdx까지의 배달만 표시
  const visible = data.filter((_,i)=>i<stepIdx);
  const curr    = data[stepIdx-1];

  // 그룹별로 묶기
  const byGroup = {};
  visible.forEach(d=>{
    const g=d.group_id;
    if(!byGroup[g]) byGroup[g]=[];
    byGroup[g].push(d);
  });

  const listItems=[];

  Object.values(byGroup).forEach(items=>{
    const isGroupActive = items.some(d=>d.idx===curr?.idx);
    const isGroupCompleted = !isGroupActive && items.every((_,i,arr)=>arr.length>0);

    if(items.length===1){
      // 단독 배달: 픽업→배달 직선
      const d=items[0];
      if(!d.p||!d.de) return;
      const isActive  = d.idx===curr?.idx;
      const isCompleted = d.idx<(curr?.idx??0);
      const color = isCompleted?'#2a2a2a':d.color;
      const pPos = new naver.maps.LatLng(d.p.lat,d.p.lng);
      const dPos = new naver.maps.LatLng(d.de.lat,d.de.lng);
      AM.push(mkM(pPos,d.idx,isCompleted?'#2a2a2a':d.color,isActive,isCompleted,true));
      AM.push(mkM(dPos,d.idx,isCompleted?'#2a2a2a':d.color,isActive,isCompleted,false));
      AL.push(mkLine([pPos,dPos],color,isActive?3:1.5,isCompleted?0.15:0.8,'solid'));
      listItems.push({...d,isActive,isCompleted});

    } else {
      // 멀티 배달: 픽픽배배 순서로 동선 그리기
      const color = items[0].color;
      const isCompleted = items.every(d=>d.idx<(curr?.idx??0));
      const lineColor = isCompleted?'#1e1e1e':color;
      const lineOp = isCompleted?0.12:0.85;

      // 픽업 순서 정렬
      const pickOrder = [...items].sort((a,b)=>
        new Date('2000/01/01 '+a.t_pickup)-new Date('2000/01/01 '+b.t_pickup));
      // 전달 순서 정렬
      const delOrder = [...items].sort((a,b)=>
        new Date('2000/01/01 '+a.t_deliver)-new Date('2000/01/01 '+b.t_deliver));

      // 마커 표시
      pickOrder.forEach(d=>{
        if(!d.p||!d.de) return;
        const isActive=d.idx===curr?.idx;
        const iComp=d.idx<(curr?.idx??0);
        const pPos=new naver.maps.LatLng(d.p.lat,d.p.lng);
        const dPos=new naver.maps.LatLng(d.de.lat,d.de.lng);
        AM.push(mkM(pPos,d.idx,iComp?'#2a2a2a':color,isActive,iComp,true));
        AM.push(mkM(dPos,d.idx,iComp?'#2a2a2a':color,isActive,iComp,false));
      });

      // 픽픽픽 → 배배배 동선 라인
      // 픽업지들 순서대로 연결
      const pickCoords = pickOrder.filter(d=>d.p).map(d=>new naver.maps.LatLng(d.p.lat,d.p.lng));
      // 전달지들 순서대로 연결
      const delCoords  = delOrder.filter(d=>d.de).map(d=>new naver.maps.LatLng(d.de.lat,d.de.lng));

      if(pickCoords.length>1){
        // 픽업지들 이동선 (실선)
        AL.push(mkLine(pickCoords,lineColor,isCompleted?1:2,lineOp,'solid'));
      }
      if(pickCoords.length>0 && delCoords.length>0){
        // 마지막 픽업지 → 첫 배달지 (실선)
        AL.push(mkLine([pickCoords[pickCoords.length-1],delCoords[0]],lineColor,isCompleted?1:2,lineOp,'solid'));
      }
      if(delCoords.length>1){
        // 배달지들 이동선 (실선)
        AL.push(mkLine(delCoords,lineColor,isCompleted?1:2,lineOp,'solid'));
      }

      items.forEach(d=>listItems.push({...d,
        isActive:d.idx===curr?.idx,
        isCompleted:d.idx<(curr?.idx??0)}));
    }
  });

  // 이전배달지→현재픽업 이동선 (점선)
  if(stepIdx>1){
    const prev=data[stepIdx-2];
    if(prev?.de && curr?.p){
      const from=new naver.maps.LatLng(prev.de.lat,prev.de.lng);
      const to=new naver.maps.LatLng(curr.p.lat,curr.p.lng);
      AL.push(mkLine([from,to],'#444',1,0.35,'shortdash'));
    }
  }

  // 지도 이동
  if(curr?.p) map.panTo(new naver.maps.LatLng(curr.p.lat,curr.p.lng));

  // 하단 카드
  document.getElementById('current-list').innerHTML=
    listItems.sort((a,b)=>a.idx-b.idx).slice(-4).map(c=>`
      <div class="curr-item ${c.isCompleted?'done':''}" style="border-left:3px solid ${c.isCompleted?'#333':c.color}">
        ${c.is_multi?`<div class="multi-badge" style="background:${c.color}22;color:${c.color}">${c.group_size}동시</div>`:''}
        <div class="curr-shop">#${c.idx} ${c.shop.substring(0,13)}</div>
        <div class="time-row">픽업${c.t_pickup} → 전달${c.t_deliver}</div>
        <div class="curr-status" style="color:${c.isActive?c.color:'#444'}">
          ${c.isActive?'🔴 진행중':'✅ 완료'} · ${parseInt(c.fee).toLocaleString()}원
        </div>
      </div>`).join('');
}

function onSlider(val){
  const data=cache[currentSlot];
  if(!data) return;
  document.getElementById('slider-label').textContent=`#${val} / ${data.length}`;
  renderAt(parseInt(val));
}

async function setSlot(idx){
  currentSlot=idx;
  document.querySelectorAll('.slot-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  clr();
  document.getElementById('slider').value=1;
  await loadSlot(idx);
  const n=cache[idx].length;
  document.getElementById('slider').max=n;
  document.getElementById('slider-label').textContent=`#1 / ${n}`;
  renderAt(1);
}

naver.maps.Event.addListener(map,'init',()=>setSlot(0));
setTimeout(()=>setSlot(0),600);
</script>
