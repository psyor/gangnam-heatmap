html, body { height:100%; }

.slot-tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }

#slider-wrap { display:flex; align-items:center; gap:10px; }
#slider-wrap span { font-size:11px; color:#555; white-space:nowrap; }
#slider { flex:1; -webkit-appearance:none; appearance:none; height:6px; border-radius:3px; background:#333; outline:none; cursor:pointer; }
#slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#FF6B35; cursor:pointer; border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.5); }

#slider-label { font-size:12px; color:#FF6B35; font-weight:700; white-space:nowrap; min-width:55px; text-align:right; }
#map { flex:1; width:100%; }
#info-panel { background:#1a1a1a; border-top:1px solid #2a2a2a; padding:8px 12px 10px; flex-shrink:0; }
.info-title { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
#current-list { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.curr-item { flex-shrink:0; background:#222; border-radius:7px; padding:6px 10px; min-width:150px; font-size:11px; border-left:3px solid #FF6B35; }
.curr-item.done { border-color:#333; opacity:0.4; }
.curr-shop { font-weight:600; color:#fff; margin-bottom:4px; }
.time-row { display:flex; gap:4px; align-items:center; font-size:10px; }
.time-tag { padding:1px 5px; border-radius:3px; font-size:9px; font-weight:600; }
.tag-dispatch { background:#3a3a3a; color:#888; }
.tag-pickup   { background:#F59E0B22; color:#F59E0B; }
.tag-deliver  { background:#FF6B3522; color:#FF6B35; }
.curr-status  { font-size:10px; margin-top:3px; }
.curr-status.active { color:#FF6B35; }
.curr-status.done2  { color:#444; }
#loading { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:14px; }
#loading-text { font-size:13px; color:#aaa; }
#loading-bar-wrap { width:200px; height:4px; background:#333; border-radius:2px; }
#loading-bar { height:100%; background:#FF6B35; border-radius:2px; width:0%; transition:width 0.1s; }
</style>

kup": "00:03", "t_deliver": "00:23"}, {"idx": 92, "slot": 3, "pickup_addr": "서울특별시 강남구 논현로85길 52", "dest_addr": "서울 강남구 역삼로3길 7", "shop": "BHC 역삼점", "fee": "3580", "t_dispatch": "00:23", "t_pickup": "00:35", "t_deliver": "00:39"}, {"idx": 93, "slot": 3, "pickup_addr": "서울특별시 강남구 논현로85길 52", "dest_addr": "서울 강남구 역삼로10길 13", "shop": "BHC 역삼점", "fee": "2640", "t_dispatch": "00:23", "t_pickup": "00:35", "t_deliver": "00:43"}];

const SLOT_COLORS = ['#F59E0B','#10B981','#FF6B35','#7F77DD'];
let map, currentSlot=0, slotCache={}, activeMarkers=[], activeLines=[];

map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.502, 127.025),
  zoom: 14, scaleControl: false,
});

function geocode(address) {
  return new Promise((resolve, reject) => {
    naver.maps.Service.geocode({query: address}, (status, response) => {
      if (status !== naver.maps.Service.Status.OK) { reject(); return; }
      const items = response.v2.addresses;
      if (!items || !items.length) { reject(); return; }
      resolve({ lat: parseFloat(items[0].y), lng: parseFloat(items[0].x) });
    });
  });
}

async function loadSlot(slotIdx) {
  if (slotCache[slotIdx]) return;
  const deliveries = ALL_DELIVERIES.filter(d => d.slot === slotIdx);
  const result = [];
  let done = 0, total = deliveries.length * 2;
  document.getElementById('loading').style.display = 'flex';
  for (const d of deliveries) {
    let pickup=null, dest=null;
    try { pickup = await geocode(d.pickup_addr); } catch(e){}
    done++;
    try { dest = await geocode(d.dest_addr); } catch(e){}
    done++;
    result.push({ ...d, pickup, dest });
    document.getElementById('loading-text').textContent = `주소 변환 중... (${done}/${total})`;
    document.getElementById('loading-bar').style.width = (done/total*100)+'%';
    await new Promise(r => setTimeout(r, 60));
  }
  document.getElementById('loading').style.display = 'none';
  slotCache[slotIdx] = result;
}

function clearMap() {
  activeMarkers.forEach(m=>m.setMap(null));
  activeLines.forEach(l=>l.setMap(null));
  activeMarkers=[]; activeLines=[];
}

function mkMarker(pos, label, isActive, isCompleted, color, isPickup) {
  const sz = isActive ? 26 : 20;
  const bg = isCompleted ? '#2a2a2a' : color;
  const bc = isCompleted ? '#444' : (isActive ? '#fff' : '#ccc');
  const tc = isCompleted ? '#555' : '#fff';
  const glow = isActive ? `box-shadow:0 0 0 4px ${color}44;` : '';
  const shape = isPickup ? 'border-radius:50%;' : 'border-radius:4px;';
  return new naver.maps.Marker({
    map, position: pos,
    icon: {
      content: `<div style="width:${sz}px;height:${sz}px;${shape}background:${bg};border:2.5px solid ${bc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${tc};${glow}">${label}</div>`,
      anchor: new naver.maps.Point(sz/2, sz/2),
    }
  });
}

function renderAt(stepIdx) {
  const data = slotCache[currentSlot];
  if (!data) return;
  clearMap();
  const color = SLOT_COLORS[currentSlot];
  const listItems = [];

  data.forEach((d, i) => {
    if (!d.pickup || !d.dest || i >= stepIdx) return;
    const isCompleted = i < stepIdx - 1;
    const isActive    = i === stepIdx - 1;
    const pickupPos = new naver.maps.LatLng(d.pickup.lat, d.pickup.lng);
    const destPos   = new naver.maps.LatLng(d.dest.lat,   d.dest.lng);

    activeMarkers.push(
      mkMarker(pickupPos, d.idx, isActive, isCompleted, color, true),
      mkMarker(destPos,   d.idx, isActive, isCompleted, color, false)
    );
    activeLines.push(new naver.maps.Polyline({
      map, path: [pickupPos, destPos],
      strokeColor: isCompleted ? '#333' : color,
      strokeWeight: isActive ? 3 : 1.5,
      strokeOpacity: isCompleted ? 0.2 : 0.85,
      strokeStyle: isCompleted ? 'shortdash' : 'solid',
    }));
    if (i > 0 && data[i-1]?.dest) {
      const prev = new naver.maps.LatLng(data[i-1].dest.lat, data[i-1].dest.lng);
      activeLines.push(new naver.maps.Polyline({
        map, path: [prev, pickupPos],
        strokeColor: isCompleted ? '#222' : '#555',
        strokeWeight: 1,
        strokeOpacity: isCompleted ? 0.1 : 0.45,
        strokeStyle: 'shortdash',
      }));
    }
    listItems.push({...d, isActive, isCompleted});
  });

  const curr = data[stepIdx-1];
  if (curr?.pickup) map.panTo(new naver.maps.LatLng(curr.pickup.lat, curr.pickup.lng));

  // 하단 카드 — 3단계 시간 표시
  document.getElementById('current-list').innerHTML =
    listItems.slice(-4).map(c => `
      <div class="curr-item ${c.isCompleted?'done':''}">
        <div class="curr-shop">#${c.idx} ${c.shop.substring(0,12)}</div>
        <div class="time-row">
          <span class="time-tag tag-dispatch">배차</span>${c.t_dispatch}
          <span class="time-tag tag-pickup">픽업</span>${c.t_pickup}
          <span class="time-tag tag-deliver">전달</span>${c.t_deliver}
        </div>
        <div class="curr-status ${c.isActive?'active':'done2'}">
          ${c.isActive ? '🔴 진행중' : '✅ 완료'} · ${parseInt(c.fee).toLocaleString()}원
        </div>
      </div>`).join('');
}

function onSlider(val) {
  const data = slotCache[currentSlot];
  if (!data) return;
  document.getElementById('slider-label').textContent = `#${val} / ${data.length}`;
  renderAt(parseInt(val));
}

async function setSlot(idx) {
  currentSlot = idx;
  document.querySelectorAll('.slot-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  clearMap();
  document.getElementById('slider').value = 1;
  await loadSlot(idx);
  const n = slotCache[idx].length;
  document.getElementById('slider').max = n;
  document.getElementById('slider-label').textContent = `#1 / ${n}`;
  renderAt(1);
}

naver.maps.Event.addListener(map,'init',()=>setSlot(0));
setTimeout(()=>setSlot(0), 600);
</script>
