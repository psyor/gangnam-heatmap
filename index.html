: 89, "time": "00:15", "slot": 3, "pickup_addr": "서울특별시 강남구 논현로102길 12", "dest_addr": "서울 강남구 언주로87길 41", "shop": "매드피자 강남점", "fee": "3180", "ts_dispatch": 1783900909, "ts_pickup": 1783901379, "ts_deliver": 1783901748}, {"idx": 90, "time": "00:18", "slot": 3, "pickup_addr": "서울특별시 강남구 테헤란로27길 23", "dest_addr": "서울 강남구 언주로87길 50", "shop": "김치찜 팝니다 강남본점", "fee": "3820", "ts_dispatch": 1783900481, "ts_pickup": 1783901487, "ts_deliver": 1783901884}, {"idx": 91, "time": "00:23", "slot": 3, "pickup_addr": "서울특별시 강남구 언주로103길 27", "dest_addr": "서울 강남구 강남대로84길 33", "shop": "조선냉면 강남점", "fee": "4860", "ts_dispatch": 1783900525, "ts_pickup": 1783900988, "ts_deliver": 1783902192}, {"idx": 92, "time": "00:39", "slot": 3, "pickup_addr": "서울특별시 강남구 논현로85길 52", "dest_addr": "서울 강남구 역삼로3길 7", "shop": "BHC 역삼점", "fee": "3580", "ts_dispatch": 1783902209, "ts_pickup": 1783902945, "ts_deliver": 1783903179}, {"idx": 93, "time": "00:43", "slot": 3, "pickup_addr": "서울특별시 강남구 논현로85길 52", "dest_addr": "서울 강남구 역삼로10길 13", "shop": "BHC 역삼점", "fee": "2640", "ts_dispatch": 1783902209, "ts_pickup": 1783902949, "ts_deliver": 1783903384}];

const SLOT_COLORS = ['#F59E0B','#10B981','#FF6B35','#7F77DD'];
let map, currentSlot=0;
let slotCache = {};
let activeMarkers=[], activeLines=[];

map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.502, 127.025),
  zoom: 14,
  scaleControl: false,
});

function geocode(address) {
  return new Promise((resolve, reject) => {
    naver.maps.Service.geocode({query: address}, (status, response) => {
      if (status !== naver.maps.Service.Status.OK) { reject(); return; }
      const items = response.v2.addresses;
      if (!items || !items.length) { reject(); return; }
      resolve({ lat: parseFloat(items[0].y), lng: parseFloat(items[0].x) });
    });
  });
}

async function loadSlot(slotIdx) {
  if (slotCache[slotIdx]) return slotCache[slotIdx];
  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  const deliveries = ALL_DELIVERIES.filter(d => d.slot === slotIdx);
  const result = [];
  let done = 0;
  for (const d of deliveries) {
    try {
      const pickup = await geocode(d.pickup_addr);
      const dest   = await geocode(d.dest_addr);
      result.push({ ...d, pickup, dest });
    } catch(e) {
      result.push({ ...d, pickup:null, dest:null });
    }
    done++;
    statusEl.textContent = `📍 주소 변환 중... (${done}/${deliveries.length})`;
    await new Promise(r => setTimeout(r, 80));
  }
  statusEl.style.display = 'none';
  slotCache[slotIdx] = result;
  return result;
}

function clearMap() {
  activeMarkers.forEach(m=>m.setMap(null));
  activeLines.forEach(l=>l.setMap(null));
  activeMarkers=[]; activeLines=[];
}

function mkMarker(pos, label, isActive, isCompleted, color, isPickup) {
  const size = isActive ? 24 : 20;
  const bg   = isCompleted ? '#333' : color;
  const bc   = isCompleted ? '#555' : '#fff';
  const tc   = isCompleted ? '#666' : '#fff';
  const glow = isActive ? `box-shadow:0 0 0 4px ${color}44;` : '';
  const shape = isPickup
    ? `border-radius:50%;`
    : `border-radius:4px;`;
  return new naver.maps.Marker({
    map, position: pos,
    icon: {
      content: `<div style="width:${size}px;height:${size}px;${shape}background:${bg};border:2px solid ${bc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${tc};${glow}">${label}</div>`,
      anchor: new naver.maps.Point(size/2, size/2),
    }
  });
}

function renderAt(stepIdx) {
  const data = slotCache[currentSlot];
  if (!data) return;
  clearMap();
  const color = SLOT_COLORS[currentSlot];
  const listItems = [];

  data.forEach((d, i) => {
    if (!d.pickup || !d.dest) return;
    const isCompleted = i < stepIdx - 1;
    const isActive    = i === stepIdx - 1;
    if (i >= stepIdx) return; // 미래 건 숨김

    const pickupPos = new naver.maps.LatLng(d.pickup.lat, d.pickup.lng);
    const destPos   = new naver.maps.LatLng(d.dest.lat, d.dest.lng);

    // 마커
    const pm = mkMarker(pickupPos, d.idx, isActive, isCompleted, color, true);
    const dm = mkMarker(destPos,   d.idx, isActive, isCompleted, color, false);

    // 픽업→배달 선
    const line = new naver.maps.Polyline({
      map,
      path: [pickupPos, destPos],
      strokeColor: isCompleted ? '#3a3a3a' : color,
      strokeWeight: isActive ? 3 : 2,
      strokeOpacity: isCompleted ? 0.2 : 0.85,
      strokeStyle: isCompleted ? 'shortdash' : 'solid',
    });

    // 이전배달지→현재픽업 이동선
    if (i > 0 && data[i-1]?.dest) {
      const prev = new naver.maps.LatLng(data[i-1].dest.lat, data[i-1].dest.lng);
      const mov = new naver.maps.Polyline({
        map,
        path: [prev, pickupPos],
        strokeColor: isCompleted ? '#2a2a2a' : '#666',
        strokeWeight: 1,
        strokeOpacity: isCompleted ? 0.15 : 0.5,
        strokeStyle: 'shortdash',
      });
      activeLines.push(mov);
    }

    activeMarkers.push(pm, dm);
    activeLines.push(line);

    listItems.push({ idx:d.idx, shop:d.shop, time:d.time, fee:d.fee, isActive, isCompleted });
  });

  // 지도 이동 (현재 활성 픽업지 중심)
  const curr = data[stepIdx-1];
  if (curr?.pickup) {
    map.panTo(new naver.maps.LatLng(curr.pickup.lat, curr.pickup.lng));
  }

  // 하단 리스트 (최근 5건)
  document.getElementById('current-list').innerHTML =
    listItems.slice(-5).map(c => `
      <div class="curr-item ${c.isCompleted?'done':''}">
        <div class="curr-time">${c.time}</div>
        <div class="curr-shop">${c.shop.substring(0,14)}</div>
        <div class="curr-status ${c.isActive?'active':'done2'}">
          ${c.isActive ? '🔴 진행중' : '✅ 완료'} · ${parseInt(c.fee).toLocaleString()}원
        </div>
      </div>`).join('');
}

function onSlider(val) {
  const data = slotCache[currentSlot];
  if (!data) return;
  document.getElementById('slider-label').textContent = `#${val} / ${data.length}`;
  renderAt(parseInt(val));
}

async function setSlot(idx) {
  currentSlot = idx;
  document.querySelectorAll('.slot-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  clearMap();
  document.getElementById('slider').value = 1;
  document.getElementById('current-list').textContent = '로딩 중...';
  await loadSlot(idx);
  const n = slotCache[idx].length;
  document.getElementById('slider').max = n;
  document.getElementById('slider-label').textContent = `#1 / ${n}`;
  renderAt(1);
}

naver.maps.Event.addListener(map,'init',()=>setSlot(0));
setTimeout(()=>setSlot(0), 800);
</script>
